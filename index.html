function Card({children,accent,style:s={},onClick}){
  const[hov,setHov]=useState(false);
  return React.createElement('div',{
    onClick,
    onMouseEnter:()=>setHov(true),
    onMouseLeave:()=>setHov(false),
    style:{background:T.bg2,border:`1px solid ${hov&&accent?accent+"40":T.border}`,borderRadius:16,padding:"16px 18px",
      transition:"all .2s",boxShadow:hov&&accent?`0 0 0 1px ${accent}15,0 8px 32px rgba(0,0,0,.5)`:"0 2px 8px rgba(0,0,0,.3)",
      cursor:onClick?"pointer":"default",...s},
  },children);
}

function KPI({label,value,sub,color,icon,trend}){
  return React.createElement(Card,{accent:color,style:{flex:"1 1 45%",minWidth:140}},
    React.createElement('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}},
      React.createElement('span',{style:{fontSize:10,color:T.t4,textTransform:"uppercase",letterSpacing:1,fontWeight:600}},label),
      icon&&React.createElement('span',{style:{fontSize:18}},icon)
    ),
    React.createElement('div',{style:{fontSize:21,fontWeight:700,color,fontFamily:"'JetBrains Mono',monospace",letterSpacing:-1}},value),
    React.createElement('div',{style:{display:"flex",gap:6,alignItems:"center",marginTop:5}},
      trend!==undefined&&React.createElement('span',{style:{fontSize:11,color:trend>=0?T.red:T.neon,fontWeight:700}},
        (trend>=0?"↑":"↓")+Math.abs(trend).toFixed(1)+"%"),
      sub&&React.createElement('span',{style:{fontSize:11,color:T.t4}},sub)
    )
  );
}

function PBar({value,max,color,h=5}){
  const pct=max>0?Math.min(value/max*100,100):0;
  const over=value>max&&max>0;
  return React.createElement('div',{style:{width:"100%",height:h,background:T.bg4,borderRadius:h,overflow:"hidden"}},
    React.createElement('div',{style:{width:pct+"%",height:"100%",borderRadius:h,
      background:over?T.red:`linear-gradient(90deg,${color||T.neon},${(color||T.neon)}88)`,
      boxShadow:`0 0 6px ${over?T.red:color||T.neon}50`,transition:"width .5s ease"}})
  );
}

function Modal({open,onClose,title,children}){
  if(!open)return null;
  return React.createElement('div',{
    onClick:onClose,
    style:{position:"fixed",inset:0,background:"rgba(0,0,0,.82)",backdropFilter:"blur(14px)",
      zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center",animation:"fadeIn .15s"}
  },React.createElement('div',{
    onClick:e=>e.stopPropagation(),
    style:{background:T.bg2,borderRadius:"22px 22px 0 0",width:"100%",maxWidth:480,
      maxHeight:"88vh",overflowY:"auto",padding:"14px 22px 32px",
      border:`1px solid ${T.border}`,borderBottom:"none",animation:"slideUp .28s cubic-bezier(.2,.8,.4,1)"}
  },
    React.createElement('div',{style:{width:34,height:4,background:T.bg4,borderRadius:2,margin:"0 auto 16px"}}),
    React.createElement('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}},
      React.createElement('h3',{style:{fontSize:18,fontWeight:700,letterSpacing:-.3}},title),
      React.createElement('button',{onClick:onClose,style:{background:T.bg3,border:`1px solid ${T.border}`,

        display:"flex",alignItems:"center",justifyContent:"center"}},"×")
    ),
    children

}

function SwipeRow({onDelete,children,style:outerStyle={}}){
  const[dx,setDx]=useState(0);
  const[open,setOpen]=useState(false);
  const x0=useRef(null);
  const W=72;
  const ts=e=>{x0.current=e.touches[0].clientX;};
  const tm=e=>{
    if(x0.current===null)return;
    const d=e.touches[0].clientX-x0.current;
    if(d<0)setDx(Math.max(d,-W));
    else if(open)setDx(Math.min(d-W,0));
  };
  const te=()=>{
    const snap=open?(dx>-W/2?0:-W):(dx<-W/2?-W:0);
    setDx(snap);setOpen(snap<0);x0.current=null;
  };
  const close=()=>{setDx(0);setOpen(false);};
  return React.createElement('div',{style:{position:"relative",overflow:"hidden",...outerStyle}},
    React.createElement('div',{style:{position:"absolute",right:0,top:0,bottom:0,width:W,

/* ── CREDIT CARDS ── */
const CARD_COLORS=["#4d9fff","#a855f7","#00ff88","#ffd60a","#ff9f43","#00d4ff","#ff4d6d"];

function TabCards({data,setData}){
  const[show,setShow]=useState(false);
  const[showPay,setShowPay]=useState(false);
  const[editId,setEditId]=useState(null);
  const[payCard,setPayCard]=useState(null);
  const blank={nm:"",limit:"",balance:"",min:"",rate:"",closing:"",due:"",color:CARD_COLORS[0],last4:""};
  const[form,setForm]=useState(blank);
  const[payForm,setPayForm]=useState({amt:"",dt:new Date().toISOString().slice(0,10)});
  const sf=p=>setForm(f=>({...f,...p}));
  const cards=data.cards||[];
  const totalOwed=cards.reduce((s,c)=>s+c.balance,0);
  const totalLimit=cards.reduce((s,c)=>s+c.limit,0);
  const totalMin=cards.reduce((s,c)=>s+c.min,0);
  const save=()=>{
    if(!form.nm)return;
    const obj={nm:form.nm,limit:+form.limit||0,balance:+form.balance||0,min:+form.min||0,
      rate:+form.rate||0,closing:+form.closing||0,due:+form.due||0,color:form.color,last4:form.last4};
    if(editId){setData(d=>({...d,cards:d.cards.map(c=>c.id===editId?{...c,...obj}:c)}));}
    else{setData(d=>({...d,cards:[...d.cards,{id:uid(),...obj}]}));}
    setShow(false);setEditId(null);setForm(blank);
  };
  const del=id=>{setData(d=>({...d,cards:d.cards.filter(c=>c.id!==id)}));setShow(false);setEditId(null);};
  const openEdit=c=>{setForm({nm:c.nm,limit:String(c.limit),balance:String(c.balance),min:String(c.min),
    rate:String(c.rate),closing:String(c.closing),due:String(c.due),color:c.color||CARD_COLORS[0],last4:c.last4||""});
    setEditId(c.id);setShow(true);};
  const pay=()=>{
    if(!payCard||!payForm.amt)return;
    const amt=+payForm.amt;
    setData(d=>({...d,
      cards:d.cards.map(c=>c.id===payCard.id?{...c,balance:Math.max(0,c.balance-amt)}:c),
      tx:[...d.tx,{id:uid(),dt:payForm.dt,tp:"out",cat:"Deudas",desc:"Pago "+payCard.nm,amt,met:"Transferencia",cardId:payCard.id}]
    }));
    setShowPay(false);setPayCard(null);setPayForm({amt:"",dt:new Date().toISOString().slice(0,10)});
  };
  const today=new Date().getDate();
  const now2=new Date();
  return React.createElement('div',null,
    React.createElement('div',{style:{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}},
      React.createElement(KPI,{label:"Total adeudado",value:F(totalOwed),color:T.red,icon:"💳",sub:cards.length+" tarjetas"}),
      React.createElement(KPI,{label:"Pago mínimo total",value:F(totalMin),color:T.yellow,icon:"📅",
        sub:totalLimit>0?"Límite: "+F(totalLimit):undefined})
    ),
    cards.map((c,i)=>{
      const col=c.color||CARD_COLORS[i%CARD_COLORS.length];
      const pct=c.limit>0?Math.min(c.balance/c.limit*100,100):0;
      const avail=Math.max(0,c.limit-c.balance);
      const daysToClose=c.closing?((c.closing-today+31)%31||31):null;
      const daysToDue=c.due?((c.due-today+31)%31||31):null;
      const closingSoon=daysToClose!==null&&daysToClose<=5;
      const dueSoon=daysToDue!==null&&daysToDue<=5;
      const cardTx=(data.tx||[]).filter(t=>t.cardId===c.id&&t.tp==="out"&&!(t.desc||"").startsWith("Pago "));
      const mTx=cardTx.filter(t=>{const d=new Date(t.dt+"T12:00:00");return d.getFullYear()===now2.getFullYear()&&d.getMonth()===now2.getMonth();});
      const mSpent=mTx.reduce((s,t)=>s+t.amt,0);
      return React.createElement('div',{key:c.id,style:{marginBottom:12}},
        React.createElement(Card,{accent:col},
          React.createElement('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}},
            React.createElement('div',null,
              React.createElement('div',{style:{display:"flex",alignItems:"center",gap:8,marginBottom:3}},
                React.createElement('div',{style:{width:9,height:9,borderRadius:"50%",background:col,boxShadow:`0 0 6px ${col}`}}),
                React.createElement('span',{style:{fontSize:16,fontWeight:700}},c.nm),
                c.last4&&React.createElement('span',{style:{fontSize:11,color:T.t4,fontFamily:"'JetBrains Mono',monospace"}},"•••• "+c.last4)
              ),
              React.createElement('div',{style:{display:"flex",gap:8,fontSize:11,flexWrap:"wrap"}},
                c.rate>0&&React.createElement('span',{style:{color:T.t4}},c.rate+"% anual"),
                closingSoon&&React.createElement('span',{style:{color:T.yellow}},"⚠️ Corte en "+daysToClose+"d"),
                dueSoon&&React.createElement('span',{style:{color:T.red}},"🔔 Pago en "+daysToDue+"d")
              )
            ),
            React.createElement('div',{style:{display:"flex",gap:6,alignItems:"flex-start"}},
              React.createElement('button',{onClick:()=>{setPayCard(c);setShowPay(true);},
                style:{background:col+"22",border:`1px solid ${col}50`,borderRadius:9,padding:"5px 11px",
                  cursor:"pointer",color:col,fontSize:12,fontWeight:700,fontFamily:"'Space Grotesk',sans-serif"}},
                "Pagar"),
              React.createElement('button',{onClick:()=>openEdit(c),
                style:{background:T.bg3,border:`1px solid ${T.border}`,borderRadius:9,width:32,height:32,
                  cursor:"pointer",color:T.t3,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}},
                "✏️")
            )
          ),
          React.createElement('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:8}},
            React.createElement('div',null,
              React.createElement('div',{style:{fontSize:11,color:T.t4,marginBottom:2}},"Saldo adeudado"),
              React.createElement('div',{style:{fontSize:26,fontWeight:700,color:T.red,fontFamily:"'JetBrains Mono',monospace",letterSpacing:-1}},F(c.balance))
            ),
            c.limit>0&&React.createElement('div',{style:{textAlign:"right"}},
              React.createElement('div',{style:{fontSize:11,color:T.t4,marginBottom:2}},"Disponible"),
              React.createElement('div',{style:{fontSize:18,fontWeight:700,color:T.neon,fontFamily:"'JetBrains Mono',monospace"}},F(avail))
            )
          ),
          c.limit>0&&React.createElement(PBar,{value:c.balance,max:c.limit,color:col,h:5}),
          c.limit>0&&React.createElement('div',{style:{display:"flex",justifyContent:"space-between",fontSize:10,color:T.t4,marginTop:3,marginBottom:8}},
            React.createElement('span',null,pct.toFixed(0)+"% utilizado"),
            React.createElement('span',null,"Límite: "+F(c.limit))
          ),
          React.createElement('div',{style:{display:"flex",gap:8,paddingTop:9,borderTop:`1px solid ${T.border}`,flexWrap:"wrap"}},
            c.min>0&&React.createElement('div',{style:{flex:1,minWidth:80}},
              React.createElement('div',{style:{fontSize:10,color:T.t4,marginBottom:1}},"Pago mínimo"),
              React.createElement('div',{style:{fontSize:14,fontWeight:700,color:T.yellow,fontFamily:"'JetBrains Mono',monospace"}},F(c.min))
            ),
            c.closing>0&&React.createElement('div',{style:{flex:1,minWidth:60}},
              React.createElement('div',{style:{fontSize:10,color:T.t4,marginBottom:1}},"Día corte"),
              React.createElement('div',{style:{fontSize:14,fontWeight:700,color:closingSoon?T.yellow:T.t2}},"Día "+c.closing)
            ),
            c.due>0&&React.createElement('div',{style:{flex:1,minWidth:60}},
              React.createElement('div',{style:{fontSize:10,color:T.t4,marginBottom:1}},"Fecha pago"),
              React.createElement('div',{style:{fontSize:14,fontWeight:700,color:dueSoon?T.red:T.t2}},"Día "+c.due)
            )
          ),
          mSpent>0&&React.createElement('div',{style:{marginTop:9,padding:"8px 11px",background:col+"15",
            border:`1px solid ${col}25`,borderRadius:9,display:"flex",justifyContent:"space-between",alignItems:"center"}},
            React.createElement('div',{style:{fontSize:11,color:T.t4}},"Cargado este mes"),
            React.createElement('div',{style:{fontSize:15,fontWeight:700,color:col,fontFamily:"'JetBrains Mono',monospace"}},
              F(mSpent),React.createElement('span',{style:{fontSize:11,fontWeight:400,color:T.t4}},
                " · "+mTx.length+" compras"))
          )
        )
      );
    }),
    cards.length===0&&React.createElement('div',{style:{textAlign:"center",padding:"40px 0",color:T.t4}},"No hay tarjetas registradas"),
    React.createElement(Btn,{onClick:()=>{setForm(blank);setEditId(null);setShow(true);},color:T.purple,style:{marginTop:6}},"+ Agregar tarjeta"),
    React.createElement(Modal,{open:show,onClose:()=>{setShow(false);setEditId(null);},title:editId?"Editar tarjeta":"Nueva tarjeta"},
      React.createElement(Inp,{label:"Nombre de la tarjeta",placeholder:"Ej: Visa BAC",value:form.nm,onChange:e=>sf({nm:e.target.value})}),
      React.createElement(Inp,{label:"Últimos 4 dígitos (opcional)",placeholder:"1234",maxLength:"4",value:form.last4,onChange:e=>sf({last4:e.target.value})}),
      React.createElement(Inp,{label:"Límite de crédito (₡)",type:"number",value:form.limit,onChange:e=>sf({limit:e.target.value}),inputMode:"numeric"}),
      React.createElement(Inp,{label:"Saldo adeudado actual (₡)",type:"number",value:form.balance,onChange:e=>sf({balance:e.target.value}),inputMode:"numeric"}),
      React.createElement(Inp,{label:"Pago mínimo (₡)",type:"number",value:form.min,onChange:e=>sf({min:e.target.value}),inputMode:"numeric"}),
      React.createElement(Inp,{label:"Tasa anual (%)",type:"number",value:form.rate,onChange:e=>sf({rate:e.target.value}),inputMode:"decimal"}),
      React.createElement(Inp,{label:"Día de corte",type:"number",min:"1",max:"31",value:form.closing,onChange:e=>sf({closing:e.target.value}),inputMode:"numeric"}),
      React.createElement(Inp,{label:"Día de pago",type:"number",min:"1",max:"31",value:form.due,onChange:e=>sf({due:e.target.value}),inputMode:"numeric"}),
      React.createElement(Field,{label:"Color"},
        React.createElement('div',{style:{display:"flex",gap:9,marginTop:2}},
          CARD_COLORS.map(col=>React.createElement('div',{key:col,onClick:()=>sf({color:col}),
            style:{width:28,height:28,borderRadius:"50%",background:col,cursor:"pointer",transition:"all .15s",
              border:form.color===col?"3px solid #fff":"2px solid transparent",
              boxShadow:form.color===col?`0 0 10px ${col}`:"none"}}))
        )
      ),
      React.createElement(Btn,{onClick:save,color:T.purple},editId?"Guardar cambios":"Agregar tarjeta"),
      editId&&React.createElement(Btn,{onClick:()=>del(editId),color:T.red,variant:"outline",style:{marginTop:8}},"Eliminar tarjeta")
    ),
    React.createElement(Modal,{open:showPay,onClose:()=>{setShowPay(false);setPayCard(null);},
      title:"Pagar — "+(payCard?.nm||"")},
      payCard&&React.createElement('div',{style:{background:T.red+"12",border:`1px solid ${T.red}25`,
        borderRadius:11,padding:"12px 15px",marginBottom:14}},
        React.createElement('div',{style:{fontSize:11,color:T.t4,marginBottom:2}},"Saldo adeudado"),
        React.createElement('div',{style:{fontSize:24,fontWeight:700,color:T.red,fontFamily:"'JetBrains Mono',monospace",letterSpacing:-1}},F(payCard.balance)),
        payCard.min>0&&React.createElement('div',{style:{fontSize:12,color:T.t4,marginTop:3}},"Mínimo: "+F(payCard.min))
      ),
      React.createElement(Inp,{label:"Monto del pago (₡)",type:"number",placeholder:payCard?String(payCard.min):"",
        value:payForm.amt,onChange:e=>setPayForm(f=>({...f,amt:e.target.value})),inputMode:"numeric"}),
      React.createElement(Inp,{label:"Fecha del pago",type:"date",value:payForm.dt,
        onChange:e=>setPayForm(f=>({...f,dt:e.target.value}))}),
      React.createElement(Btn,{onClick:pay,color:T.neon},"✓ Registrar pago")
    )
  );
}
